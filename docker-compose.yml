version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tarhib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tarhib
      POSTGRES_PASSWORD: tarhib_dev
      POSTGRES_DB: tarhib_dev
    ports:
      - "5432:5432"
    volumes:
      - tarhib_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tarhib-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: tarhib-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm", "--features=token-exchange"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: tarhibnewapp1234
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - tarhib_keycloak_data:/opt/keycloak/data

volumes:
  tarhib_pg_data:
  tarhib_keycloak_data:
    name: tarhib_keycloak_data
