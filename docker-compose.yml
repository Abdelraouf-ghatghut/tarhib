version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: tarhib-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tarhib
      POSTGRES_PASSWORD: tarhib_dev
      POSTGRES_DB: tarhib_dev
    ports:
      - "5432:5432"
    volumes:
      - tarhib_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tarhib-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    # Optionnel : persistance Redis
    # volumes:
    #   - tarhib_redis_data:/data

volumes:
  tarhib_pg_data:
  # tarhib_redis_data:   # décommente si tu veux persister Redis