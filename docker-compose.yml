version: "3.9"
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: tarhib
      POSTGRES_PASSWORD: tarhib_dev
      POSTGRES_DB: tarhib_dev
    ports:
      - "5432:5432"
    volumes:
      - tarhib_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  tarhib_pg_data:
