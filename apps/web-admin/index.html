<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: https:; connect-src 'self' https: wss: ws:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Externalisé (theme-init.js) : script-src 'self' sans 'unsafe-inline' interdit les scripts inline. -->
    <script src="/theme-init.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      :root { font-family: 'Thmanyah', 'Inter', 'Cairo', system-ui, sans-serif; }
      [lang="ar"], [dir="rtl"] { font-family: 'Thmanyah', 'Cairo', 'Inter', system-ui, sans-serif; }
      body { margin: 0; background: #F7F8FC; }
      [data-theme="dark"] body { background: #0B1220; }
      #root { min-height: 100vh; }
    </style>
    <title>Tarhib Admin</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
